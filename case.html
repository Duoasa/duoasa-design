<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Project case detail from Duoasa, UI/UX designer." />
  <title>Project Case - Duoasa</title>
  <link rel="stylesheet" href="assets/vendor/google-fonts/fonts.css" />
  <link rel="stylesheet" href="styles.css?v=20260531-mobile-nav" />
  <script>
    (function () {
      var saved = null;
      try { saved = localStorage.getItem("theme"); } catch (e) {}
      var theme = saved === "light" || saved === "dark" ? saved : "dark";
      document.documentElement.setAttribute("data-theme", theme);
    }());
  </script>
</head>
<body class="case-page">
  <div id="preloader" aria-hidden="true">
    <div class="pl-name"><span>Duoasa</span></div>
    <div class="pl-bar-wrap"><div class="pl-bar" id="plBar"></div></div>
  </div>

  <div class="cursor" id="cursor" aria-hidden="true">
    <div class="cursor-arrow">
      <svg width="22" height="26" viewBox="0 0 22 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2L19 13.3L11.6 15.3L7.8 23L2 2Z" fill="var(--fg)" stroke="var(--bg)" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="cursor-label">
      <span class="cursor-dot"></span>
      <span id="cursorLabelText">Welcom</span>
    </div>
  </div>

  <nav id="nav" aria-label="Primary navigation">
    <a href="index.html#hero" class="nav-logo" aria-label="Duoasa home">Duoasa</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#project">Project</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <button class="theme-btn" id="themeBtn" type="button" aria-label="Toggle color theme">
        <span id="themeIcon">◐</span>
        <span id="themeLabel">Light</span>
      </button>
    </div>
  </nav>

  <main class="case-main">
    <section class="case-hero">
      <a class="case-back" href="index.html#project" data-cursor="hi">Back to projects</a>
      <div class="case-lede">
        <span id="caseNumber" class="case-number">01</span>
        <div>
          <div class="case-kicker">
            <span id="caseYear">Project</span>
            <span id="caseStatus" class="project-status"><span></span>Status</span>
          </div>
          <h1 id="caseTitle" class="case-title">Project Case</h1>
        </div>
      </div>
      <div class="case-hero-grid">
        <div id="caseVisual" class="project-visual case-visual">
          <img id="caseImage" src="" alt="" />
          <div class="image-overlay"></div>
        </div>
        <div class="case-meta-wrap">
          <p id="caseSummary" class="case-summary"></p>
          <dl id="caseMeta" class="case-meta"></dl>
          <div id="caseTags" class="tags"></div>
        </div>
      </div>
    </section>

    <section class="case-content">
      <div id="caseSections" class="case-sections"></div>

      <article class="case-impact">
        <p class="section-label">Impact signals</p>
        <div id="caseMetrics" class="metrics case-metrics"></div>
      </article>

      <a id="caseNext" class="case-next" href="index.html#project" data-cursor="hi">
        <span>Next case</span>
        <strong></strong>
      </a>
    </section>
  </main>

  <script src="assets/vendor/gsap/gsap.min.js"></script>
  <script src="assets/vendor/gsap/ScrollTrigger.min.js"></script>
  <script src="project-cases.js?v=20260528-case-order-links"></script>
  <script src="script.js?v=20260531-motion-fix"></script>
</body>
</html>
